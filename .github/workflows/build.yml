name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Keep a single consistent Rust toolchain version across all jobs
  RUST_TOOLCHAIN: stable

jobs:
  build:
    name: Build firmware (${{ matrix.board }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        board: [pico, pico2]
        include:
          - board: pico
            target: thumbv6m-none-eabi
            features: board-pico
            elf_path: target/thumbv6m-none-eabi/release/firmware
          - board: pico2
            target: thumbv8m.main-none-eabihf
            features: board-pico2
            elf_path: target/thumbv8m.main-none-eabihf/release/firmware

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Rust toolchain ───────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      # ── Cargo cache ─────────────────────────────────────────────────────────
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ env.RUST_TOOLCHAIN }}-${{ matrix.board }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ env.RUST_TOOLCHAIN }}-${{ matrix.board }}-
            ${{ runner.os }}-cargo-target-${{ env.RUST_TOOLCHAIN }}-
            ${{ runner.os }}-cargo-target-

      # ── Native toolchain (for C bacnet-stack via cc crate) ───────────────────
      - name: Install arm-none-eabi-gcc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi

      # ── Bun + frontend build ─────────────────────────────────────────────────
      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      # ── Embed web assets ─────────────────────────────────────────────────────
      - name: Embed assets into firmware
        run: python3 tools/embed_assets.py

      # ── Host-target tests (bridge-core, only run once — on the pico matrix leg) ──
      - name: Run host tests (bridge-core)
        if: matrix.board == 'pico'
        run: cargo test -p bridge-core

      # ── Lint (only run once — on the pico matrix leg) ────────────────────────
      - name: Check formatting
        if: matrix.board == 'pico'
        run: cargo fmt --all -- --check

      - name: Clippy (host)
        if: matrix.board == 'pico'
        run: cargo clippy -p bridge-core -- -D warnings

      # ── Firmware build (no_std) ───────────────────────────────────────────────
      - name: Build firmware (release, ${{ matrix.board }})
        run: cargo build -p firmware --release --target ${{ matrix.target }} --features ${{ matrix.features }} --no-default-features

      # ── Convert ELF → UF2 ────────────────────────────────────────────────────
      - name: Install elf2uf2-rs
        run: cargo install elf2uf2-rs --locked
        # Only attempt conversion if the tool can be installed; non-fatal for PRs.
        continue-on-error: true

      - name: Convert ELF to UF2
        run: |
          ELF="${{ matrix.elf_path }}"
          VERSION="0.1.${{ github.run_number }}"
          UF2="target/micro-bacnet-bridge-${VERSION}-${{ matrix.board }}.uf2"
          if command -v elf2uf2-rs &>/dev/null && [ -f "$ELF" ]; then
            elf2uf2-rs "$ELF" "$UF2"
            echo "UF2_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "UF2_PATH=$UF2" >> "$GITHUB_ENV"
            echo "FW_VERSION=$VERSION" >> "$GITHUB_ENV"
          else
            echo "UF2_AVAILABLE=false" >> "$GITHUB_ENV"
          fi

      # ── Upload artifacts ─────────────────────────────────────────────────────
      - name: Upload firmware ELF (${{ matrix.board }})
        uses: actions/upload-artifact@v4
        with:
          name: firmware-elf-${{ matrix.board }}
          path: ${{ matrix.elf_path }}
          if-no-files-found: error

      - name: Upload firmware UF2 (${{ matrix.board }})
        if: env.UF2_AVAILABLE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-uf2-${{ matrix.board }}
          path: ${{ env.UF2_PATH }}
          if-no-files-found: warn
